<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaptionAI — Viral Captions in Seconds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #04040a;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-hover: rgba(255,255,255,0.07);
      --aurora1: #a78bfa;
      --aurora2: #60a5fa;
      --aurora3: #f472b6;
      --aurora4: #34d399;
      --text: #f1f0ef;
      --muted: #6b7280;
      --soft: #9ca3af;
      --success: #34d399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AURORA BACKGROUND ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: drift 20s ease-in-out infinite;
      opacity: 0.15;
    }

    .orb1 { width: 600px; height: 600px; background: var(--aurora1); top: -200px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 500px; height: 500px; background: var(--aurora2); top: 30%; right: -150px; animation-delay: -7s; }
    .orb3 { width: 400px; height: 400px; background: var(--aurora3); bottom: -100px; left: 30%; animation-delay: -14s; }
    .orb4 { width: 300px; height: 300px; background: var(--aurora4); top: 60%; left: -50px; animation-delay: -5s; opacity: 0.1; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.05); }
      66%       { transform: translate(-20px, 20px) scale(0.97); }
    }

    /* ── GRID OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── LAYOUT ── */
    .wrapper {
      position: relative;
      z-index: 2;
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* ── HEADER ── */
    header {
      margin-bottom: 64px;
      animation: fadeUp 0.8s ease both;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .eyebrow-line {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, var(--aurora1), var(--aurora2));
    }

    .eyebrow-text {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--aurora1), var(--aurora2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    h1 em {
      font-style: italic;
      font-weight: 600;
      background: linear-gradient(135deg, var(--aurora1) 0%, var(--aurora3) 50%, var(--aurora2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 440px;
    }

    /* ── GLASS CARD ── */
    .glass-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 20px;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.2s;
      transition: border-color 0.3s;
    }

    .glass-card:hover {
      border-color: rgba(255,255,255,0.13);
    }

    /* ── FIELD LABEL ── */
    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── INPUT ── */
    .input-wrap {
      position: relative;
      margin-bottom: 32px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 16px 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: all 0.25s;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

    input[type="text"]:focus {
      border-color: rgba(167,139,250,0.4);
      background: rgba(167,139,250,0.04);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.08);
    }

    /* ── TONE PILLS ── */
    .tone-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tone-pill {
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .tone-pill:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--soft);
      background: rgba(255,255,255,0.04);
    }

    .tone-pill.active {
      background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(96,165,250,0.2));
      border-color: rgba(167,139,250,0.5);
      color: #c4b5fd;
      font-weight: 500;
    }

    /* ── SEPARATOR ── */
    .sep {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 32px 0;
    }

    /* ── GENERATE BUTTON ── */
    .gen-btn {
      position: relative;
      width: 100%;
      padding: 18px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s, opacity 0.2s;
      background: linear-gradient(135deg, #7c3aed, #6366f1, #3b82f6);
      color: #fff;
    }

    .gen-btn::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 13px;
      background: linear-gradient(135deg, #6d28d9, #4f46e5, #2563eb);
      z-index: 0;
      transition: opacity 0.2s;
    }

    .gen-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.6s;
      z-index: 1;
    }

    .gen-btn:hover::after { left: 160%; }
    .gen-btn:hover { transform: translateY(-2px); }
    .gen-btn:active { transform: translateY(0); }
    .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .gen-btn span { position: relative; z-index: 2; }

    /* ── LOADER ── */
    .loader {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    .loader.show { display: flex; }

    .pulse-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--aurora1);
      animation: pulse 1.4s ease infinite;
    }
    .pulse-dots span:nth-child(2) { background: var(--aurora2); animation-delay: 0.2s; }
    .pulse-dots span:nth-child(3) { background: var(--aurora3); animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40%            { transform: scale(1.2); opacity: 1; }
    }

    /* ── ERROR ── */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.2);
      color: #fb7185;
      font-size: 0.88rem;
    }
    .error-box.show { display: block; }

    /* ── RESULTS ── */
    #results {
      display: none;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.5s ease both;
    }
    #results.show { display: flex; }

    /* ── RESULT CARD ── */
    .result-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 24px 26px;
      position: relative;
      backdrop-filter: blur(20px);
      transition: border-color 0.2s, transform 0.2s;
    }

    .result-card:hover {
      border-color: rgba(255,255,255,0.13);
      transform: translateY(-1px);
    }

    .result-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tag-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-body {
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(241,240,239,0.9);
    }

    .hashtag-body {
      font-size: 0.88rem;
      line-height: 2;
      color: #93c5fd;
      font-weight: 400;
      word-break: break-word;
    }

    /* ── COPY BTN ── */
    .copy-btn {
      position: absolute;
      top: 18px; right: 18px;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--soft);
      border-color: rgba(255,255,255,0.15);
    }

    .copy-btn.copied {
      background: rgba(52,211,153,0.1);
      border-color: rgba(52,211,153,0.3);
      color: var(--success);
    }

    /* ── RESULTS HEADER ── */
    .results-header {
      display: none;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      animation: fadeUp 0.4s ease both;
    }
    .results-header.show { display: flex; }

    .results-header-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--glass-border), transparent);
    }

    .results-header-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 72px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(107,114,128,0.6);
      letter-spacing: 0.04em;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.4s;
    }

    footer a {
      color: rgba(167,139,250,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--aurora1); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Aurora background -->
  <div class="aurora">
    <div class="aurora-orb orb1"></div>
    <div class="aurora-orb orb2"></div>
    <div class="aurora-orb orb3"></div>
    <div class="aurora-orb orb4"></div>
  </div>

  <div class="wrapper">

    <!-- Header -->
    <header>
      
      <h1>Generate <em>Viral</em><br>Captions</h1>
      <p class="subtitle">Drop a topic, pick a vibe — get Instagram captions, trending hashtags, and Reel hooks crafted by AI.</p>
    </header>

    <!-- Input Card -->
    <div class="glass-card">

      <div class="input-wrap">
        <label class="field-label" for="topic">What's your content about?</label>
        <input
          type="text"
          id="topic"
          placeholder="sunset beach, morning coffee, gym grind, travel diary..."
          autocomplete="off"
        />
      </div>

      <div>
        <label class="field-label">Choose your vibe</label>
        <div class="tone-row">
          <button class="tone-pill active" data-tone="aesthetic">✨ Aesthetic</button>
          <button class="tone-pill" data-tone="funny">😂 Funny</button>
          <button class="tone-pill" data-tone="emotional">💙 Emotional</button>
          <button class="tone-pill" data-tone="motivational">🔥 Motivational</button>
          <button class="tone-pill" data-tone="luxury">💎 Luxury</button>
        </div>
      </div>

      <div class="sep"></div>

      <button class="gen-btn" id="generateBtn" onclick="generate()">
        <span>✦ &nbsp; Generate Captions</span>
      </button>

      <div class="loader" id="loader">
        <div class="pulse-dots">
          <span></span><span></span><span></span>
        </div>
        Crafting your content...
      </div>

      <div class="error-box" id="errorBox"></div>

    </div>

    <!-- Results Header -->
    <div class="results-header" id="resultsHeader">
      <span class="results-header-text">Your content</span>
      <div class="results-header-line"></div>
    </div>

    <!-- Results -->
    <div id="results">

      <div class="result-card">
        <button class="copy-btn" onclick="copyText('captionText', this)">Copy</button>
        <div class="result-tag">
          <span class="tag-dot" style="background:#a78bfa"></span>
          <span class="tag-label">Instagram Caption</span>
        </div>
        <div class="result-body" id="captionText"></div>
      </div>

      <div class="result-card">
        <button class="copy-btn" onclick="copyText('viralText', this)">Copy</button>
        <div class="result-tag">
          <span class="tag-dot" style="background:#f472b6"></span>
          <span class="tag-label">Viral Caption</span>
        </div>
        <div class="result-body" id="viralText"></div>
      </div>

      <div class="result-card">
        <button class="copy-btn" onclick="copyText('hashtagsText', this)">Copy</button>
        <div class="result-tag">
          <span class="tag-dot" style="background:#60a5fa"></span>
          <span class="tag-label">Hashtags</span>
        </div>
        <div class="hashtag-body" id="hashtagsText"></div>
      </div>

      <div class="result-card">
        <button class="copy-btn" onclick="copyText('hookText', this)">Copy</button>
        <div class="result-tag">
          <span class="tag-dot" style="background:#34d399"></span>
          <span class="tag-label">Reel Hook</span>
        </div>
        <div class="result-body" id="hookText"></div>
      </div>

    </div>

    <footer>
      Built with Spring Boot &amp; Groq API &nbsp;·&nbsp;
      
    </footer>

  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────
    // Change this to your Render URL after deploying
    const BACKEND_URL = "https://caption-generator-backend-72sx.onrender.com";

    // ── TONE SELECTION ──────────────────────────────
    let selectedTone = "aesthetic";

    document.querySelectorAll(".tone-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tone-pill").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTone = btn.dataset.tone;
      });
    });

    // ── GENERATE ────────────────────────────────────
    async function generate() {
      const topic = document.getElementById("topic").value.trim();

      if (!topic) {
        showError("Please enter a topic first.");
        return;
      }

      setLoading(true);
      hideResults();
      hideError();

      try {
        const response = await fetch(`${BACKEND_URL}/api/generate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, tone: selectedTone })
        });

        if (!response.ok) throw new Error(`Server error: ${response.status}`);

        const data = await response.json();
        showResults(data);

      } catch (err) {
        if (err.message.includes("Failed to fetch")) {
          showError("Cannot reach the backend. Make sure Spring Boot is running on port 8081.");
        } else {
          showError(`Error: ${err.message}`);
        }
      } finally {
        setLoading(false);
      }
    }

    // ── UI HELPERS ───────────────────────────────────
    function setLoading(on) {
      const btn = document.getElementById("generateBtn");
      btn.disabled = on;
      btn.querySelector("span").textContent = on ? "Generating..." : "✦   Generate Captions";
      document.getElementById("loader").classList.toggle("show", on);
    }

    function showResults(data) {
      document.getElementById("captionText").textContent  = data.caption      || "—";
      document.getElementById("viralText").textContent    = data.viralCaption  || "—";
      document.getElementById("hashtagsText").textContent = data.hashtags      || "—";
      document.getElementById("hookText").textContent     = data.reelHook      || "—";
      document.getElementById("results").classList.add("show");
      document.getElementById("resultsHeader").classList.add("show");
      document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function hideResults() {
      document.getElementById("results").classList.remove("show");
      document.getElementById("resultsHeader").classList.remove("show");
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg;
      box.classList.add("show");
    }

    function hideError() {
      document.getElementById("errorBox").classList.remove("show");
    }

    function copyText(id, btn) {
      navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      });
    }

    // Enter key support
    document.getElementById("topic").addEventListener("keydown", e => {
      if (e.key === "Enter") generate();
    });
  </script>

</body>
</html>
